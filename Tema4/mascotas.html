<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Refugio</title>
    <style>
        h1 {
            color: skyblue;
        }

        table {
            color: turquoise;
        }

        table,
        th,
        td {
            border: 3px dotted salmon;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 7px;
        }
    </style>
</head>

<body>
    <h1>Refugio SOS Andratx</h1>

    <table>
        <thead>
            <tr>
                <th>Mascotas</th>
                <th>Edad</th>
                <th>Raza</th>
            </tr>
        </thead>

        <tfoot>
            <tr>
                <td colspan="2">Total</td>
                <td>3</td>
            </tr>
        </tfoot>

        <tbody>
            <tr>
                <td>Pipo</td>
                <td>2</td>
                <td>Setter</td>
            </tr>
            <tr>
                <td>Garfield</td>
                <td>4</td>
                <td>Siamés</td>
            </tr>
            <tr>
                <td>Mino</td>
                <td>3</td>
                <td>Siamés</td>
            </tr>
        </tbody>

    </table>

</body>

</html>
