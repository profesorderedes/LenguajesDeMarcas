<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Ejemplo con dos párrafos</title>
    <style>
        .rojo {
            color: red;
        }

        .verde {
            color: green;
        }

        .amarillo {
            color: yellow;
        }

        .azul {
            color: blue;
        }
    </style>
</head>

<body>

    <!-- Primer ejemplo de HTML -->
    <p>Éste es el <span class="rojo">primer</span> párrafo</p>
    <p>Éste es el <span class="verde">segundo</span> párrafo</p>
    <p class="amarillo">Este párrafo va a ser amarillo</p>
    <p class="azul">Este otro va a ser azul</p>

    <p>
        <pre>Texto con muchos espacios                    en blanco,
        tabuladores                  y saltos de línea.


        A ver cómo se ve!
        </pre>
    </p>

</body>

</html>
