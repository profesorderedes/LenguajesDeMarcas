<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejemplos de HTML</title>
    <style>
        table, td{
            border: 1px solid brown;
            border-collapse: collapse;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <td colspan="2">Uno y dos</td>
            <td>Tres</td>
        </tr>
        <tr>
            <td>Cuatro</td>
            <td>Cinco</td>
            <td>Seis</td>
        </tr>
        <tr>
            <td>Siete</td>
            <td>Ocho</td>
            <td>Nueve</td>
        </tr>
    </table>

    <br><br>

    <table>
        <caption>Pruebas con rowspan</caption>
        <tr>
            <td>Uno</td>
            <td>Dos</td>
            <td>Tres</td>
        </tr>
        <tr>
            <td>Cuatro</td>
            <td>Cinco</td>
            <td>Seis</td>
        </tr>
        <tr>
            <td>Siete</td>
            <td>Ocho</td>
            <td rowspan="2">Nueve y doce</td>
        </tr>
        <tr>
            <td>Diez</td>
            <td>Once</td>
        </tr>
    </table>

    <table>

    </table>

</body>

</html>
