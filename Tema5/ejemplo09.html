        img {

        body{
            font-size: 24px;
        }
            
    </style>
</head>

<body>

    <h1>Ejemplo con vertical-align aplicado a imágenes</h1>

    las imágenes.
    <img src="imgs/perro3.jpg" alt="Perro 3">

</body>

</html>
