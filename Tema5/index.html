<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Links</title>


    <style>
        a:link {
            color: salmon;
            text-decoration: none;
        }

        a:visited {
            color: crimson;
        }

        a:hover{
            color: darkgoldenrod;
            font-size: 1.2rem;
        }

        a:active{
            color: darkmagenta;
        }
    </style>
</head>

<body>

    <h1>Genbeta</h1>
    <p>
        La dirección web de Genbeta es
        <a href="http://www.genbeta.com">ésta</a>.
    </p>

</body>

</html>
