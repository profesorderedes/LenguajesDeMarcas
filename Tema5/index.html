<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Outline en CSS</title>
    <style>
        
        h1{
            text-transform: uppercase;
        }

        .subrayado{
            text-decoration: underline;
        }

        a{
            text-decoration: none;
        }
            
    </style>
</head>

<body>

    <h1>Programación orientada a objetos</h1>
    <p>La Programación orientada a objetos tiene dos pilares fundamentales: <span class="subrayado">la herencia</span> y <span class="subrayado">el polimorfismo</span>.</p>

    <a href="https://en.wikipedia.org/wiki/Object-oriented_programming">Wikipedia</a>

</body>

</html>
