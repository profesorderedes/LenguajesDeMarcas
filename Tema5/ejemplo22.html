<!DOCTYPE html>
<html lang="es">

<!-- Solución al problema de la desaparición de bordes 
https://stackoverflow.com/questions/50361698/border-style-do-not-work-with-sticky-position-element
-->

<head>
    <meta charset="UTF-8">
    <title>Position</title>
    <style>

        div{
            width: 100px;
            height: 100px;
        }

        #caja1{
            position: absolute;
            background-color: greenyellow;
            top: 80px;
            left: 0;
            z-index: -2;
        }

        #caja2{
            position: absolute;
            top: 130px;
            left: 25px;
            background-color: blue;
            z-index: -3;
        }

        img{
            position: absolute;
            top: 100px;
            left: 50px;
            z-index: -1;
        }

    </style>
</head>

<body>

    <h1>Pruebas con z-index</h1>
    <div id="caja1"></div>
    <img src="imgs/gato-astronauta-mini.jpg" 
        alt="Gato astronauta">
    <div id="caja2"></div>
</body>

</html>
