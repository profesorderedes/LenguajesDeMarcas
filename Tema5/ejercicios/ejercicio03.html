<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Colores en CSS</title>
    <style>
        .rectangulo {
            width: 250px;
            height: 150px;
            font-size: 18px;
        }

        .rectangulo1 {
            background-color: #ffffff;
            color: #000000;
            border: 3px solid #c8c800;
        }

        .rectangulo2 {
            background-color: #00b4b4;
            color: #f0f0f0;
            border: 3px solid #dc00dc;
        }
    </style>
</head>

<body>

    <h1>Colores en CSS</h1>

    <div class="rectangulo rectangulo1">Ahora probamos con colores definidos como RGB</div>
    <br>
    <div class="rectangulo rectangulo2">Ahora probamos con colores definidos como RGB</div>

</body>

</html>
