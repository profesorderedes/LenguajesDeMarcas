<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Pruebas</title>
    <style>
        #contenedor {
            width: 40%;
            background-color: salmon;
            margin: 10px auto;
            padding: 10px;
            color: white;
        }

        .descuento {
            outline: 3px dashed rgba(0, 0, 255, 0.5);
            outline-offset: 6px;
        }
    </style>
</head>

        <h1>Ofertas en Black Friday</h1>

            Friday.</p>


    </div>




</body>

</html>
