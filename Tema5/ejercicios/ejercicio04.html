<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Colores en CSS</title>
    <style>
        .rectangulo {
            width: 250px;
            height: 150px;
            font-size: 18px;
        }

        .rectangulo1 {
            background-color: hsl(57, 100%, 50%);
            color: hsl(220, 100%, 27%);
        }

        .rectangulo2 {
            background-color: hsl(263, 90%, 53%);
            color: hsl(287, 91%, 88%);
        }
    </style>
</head>

<body>

    <h1>Colores en CSS</h1>

    <div class="rectangulo rectangulo1">¿Y por qué no utilizar el sistema HSL?</div>
    <br>
    <div class="rectangulo rectangulo2">¿Y por qué no utilizar el sistema HSL?</div>

</body>

</html>
