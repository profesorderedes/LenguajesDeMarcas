<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 5</title>
    <style>
        h1 {
            color: rgb(245, 110, 47);
        }

        div {
            width: 100px;
            height: 100px;
        }

        .caja1 {
            background-color: rgba(152, 251, 152, 0);
        }

        .caja2 {
            background-color: rgba(152, 251, 152, 0.3);
        }

        .caja3 {
            background-color: rgba(152, 251, 152, 0.7);
        }

        .caja4 {
            background-color: rgba(152, 251, 152, 1);
        }
    </style>
</head>

<body>

    <h1>Pruebas con fondo y opacidad</h1>
    Usamos la función rgba().
    <br>
    <br>
    <div class="caja1">Opacidad 0</div>
    <br>
    <div class="caja2">Opacidad 0.3</div>
    <br>
    <div class="caja3">Opacidad 0.7</div>
    <br>
    <div class="caja4">Opacidad 1</div>

</body>

</html>
