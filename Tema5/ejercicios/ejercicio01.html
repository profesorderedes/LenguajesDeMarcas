<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Colores en CSS</title>
    <style>
        .rectangulo {
            width: 250px;
            height: 150px;
            font-size: 18px;
        }

        .rectangulo1 {
            background-color: indianred;
            color: mistyrose;
            border: 3px solid goldenrod;
        }

        .rectangulo2 {
            background-color: paleturquoise;
            color: olive;
            border: 3px solid midnightblue;
        }
    </style>
</head>

<body>
    <h1>Colores en CSS</h1>
    <div class="rectangulo rectangulo1">Esto es un div para hacer pruebas con colores</div>
    <br>
    <div class="rectangulo rectangulo2">Esto es otro div para hacer más pruebas.</div>
</body>

</html>
