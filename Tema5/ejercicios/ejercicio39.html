<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicios</title>
    <style>
        h1 {
            margin-top: 0.75rem;
        }

        div {
            width: 100px;
            height: 100px;
            position: absolute;
        }

        #rectangulo-amarillo {
            background-color: yellow;
            top: 60px;
            left: 90px;
            z-index: 3;
        }

        #rectangulo-rojo {
            background-color: red;
            top: 125px;
            left: 75px;
        }

        #rectangulo-verde {
            background-color: green;
            top: 110px;
            left: 150px;
            z-index: 2;
        }

        #rectangulo-azul {
            background-color: blue;
            top: 80px;
            left: 120px;
            z-index: 1;
        }
    </style>
</head>

<body>

    <h1>Prácticas con z-index</h1>

    <div id="rectangulo-amarillo"></div>
    <div id="rectangulo-rojo"></div>
    <div id="rectangulo-verde"></div>
    <div id="rectangulo-azul"></div>

</body>

</html>
