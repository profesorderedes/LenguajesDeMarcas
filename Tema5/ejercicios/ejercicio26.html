<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <script src="https://kit.fontawesome.com/4f7346e88f.js" crossorigin="anonymous"></script>
    <title>Pruebas</title>

    <style>
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        h1 {
            font-size: 1.5em;
            color: seagreen;
        }

        .fas {
            font-size: 1.5em;
        }

        li {
            line-height: 2.5em;
            list-style-type: none;
        }

        .fa-ambulance {
            color: orangered;
        }

        .fa-bus-alt {
            color: maroon;
        }

        .fa-car {
            color: olive;
        }

        .fa-motorcycle {
            color: lawngreen;
        }

        .fa-truck {
            color: red;
        }
    </style>

</head>

<body>

    <h1>Iconos de Font Awesome</h1>

    <p>En Font Awesome disponemos de los siguientes iconos de automoción:</p>
    <ul>
        <li><i class="fas fa-ambulance"></i> Ambulancia</li>
        <li><i class="fas fa-bus-alt"></i> Autobús</li>
        <li><i class="fas fa-car"></i> Coche</li>
        <li><i class="fas fa-motorcycle"></i> Motocicleta</li>
        <li><i class="fas fa-truck"></i> Camión</li>
    </ul>

</body>

</html>
