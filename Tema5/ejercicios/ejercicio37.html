<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: black;
        }

        .contenedor {
            height: 100vh;
            text-align: center;
        }

        .imagen-fondo {
            height: 100%;
        }

        .texto {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-size: 1.1rem;
            padding: 0.7rem;
            color: #333;
            background-color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 5px;
            position: absolute;
        }

        .encabezado {
            top: 40px;
            left: 320px;

        }

        .pie {
            bottom: 20px;
            right: 330px;
        }
    </style>
</head>

<body>

    <div class="contenedor">

        <img class="imagen-fondo" src="imgs/arquitectura/arsene-m-ovrejorde-BovGw4div6U-unsplash.jpg" alt="Edificio">

        <p class="texto encabezado">Edificio extraño fotografiado durante la puesta de Sol</p>

        <p class="texto pie">&#169; Carlos Design Solutions</p>

    </div>

</body>

</html>
