<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Colores en CSS</title>
    <style>
        .rectangulo {
            width: 250px;
            height: 150px;
            font-size: 18px;
        }

        .rectangulo1 {
            background-color: rgb(255, 255, 255);
            color: rgb(0, 0, 0);
            border: 3px solid rgb(200, 200, 0);
        }

        .rectangulo2 {
            background-color: rgb(0, 180, 180);
            color: rgb(240, 240, 240);
            border: 3px solid rgb(220, 0, 220);
        }
    </style>
</head>

<body>

    <h1>Colores en CSS</h1>

    <div class="rectangulo rectangulo1">Ahora probamos con colores definidos como RGB</div>
    <br>
    <div class="rectangulo rectangulo2">Ahora probamos con colores definidos como RGB</div>

</body>

</html>
