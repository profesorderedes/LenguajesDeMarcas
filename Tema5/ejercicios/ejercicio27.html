<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.0/font/bootstrap-icons.css">

    <title>Pruebas</title>

    <style>
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        h1 {
            font-size: 1.5em;
            color: seagreen;
        }

        .bi {
            font-size: 1.5em;
        }

        li {
            line-height: 2.5em;
            list-style-type: none;
        }

        .bi-cart4 {
            color: orangered;
        }

        .bi-chat-left-text {
            color: maroon;
        }

        .bi-check-circle {
            color: olive;
        }

        .bi-cloud-arrow-down {
            color: lawngreen;
        }

        .bi-emoji-sunglasses {
            color: red;
        }
    </style>

</head>

<body>

    <h1>Iconos de Bootstrap</h1>

    <p>En Bootstrap disponemos también de una amplia colección de iconos:</p>
    <ul>
        <li><i class="bi bi-cart4"></i> Cesta de la compra</li>
        <li><i class="bi bi-chat-left-text"></i> Mensaje de chat</li>
        <li><i class="bi bi-check-circle"></i> Actividad completada</li>
        <li><i class="bi bi-cloud-arrow-down"></i> Descargar</li>
        <li><i class="bi bi-emoji-sunglasses"></i> Emoji satisfecho</li>
    </ul>

</body>

</html>
