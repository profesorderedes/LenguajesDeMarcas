<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicios</title>
    <style>
        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif
        }

        .splash {

            background-color: #ccc;
            width: 30%;
            height: 10rem;
            margin: 3rem auto;
            padding: 0.6rem;
            text-align: center;
            box-shadow: 10px 10px 5px #ddd;
        }

        h1 {
            font-size: 1.5rem;
        }

        .oferton {
            position: relative;
            bottom: 4.2rem;
            left: 1rem;
            margin: 0;
            width: 15rem;
            font-size: 3rem;
            text-transform: uppercase;
            color: red;
            opacity: 0.3;
            border: 5px dashed red;
        }
    </style>
</head>

<body>

    <div class="splash">

        <h1>Consigue tu promoción en la primera compra</h1>

        <p>Si compras por primera vez en esta tienda, recibirás un descuento de 5 €.</p>

        <p class="oferton">Ofertón</p>

    </div>


</body>

</html>
