<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicios</title>
    <style>
        .letra {
            position: sticky;
            top: 0;
            font-size: 1.2rem;
            font-weight: bold;
            border: 1px solid green;
            background-color: yellow;
            padding-left: 0.3rem;
        }

        div.espacio {
            height: 40rem;
        }
    </style>
</head>

<body>

    <h1>Listado alfabético de lenguajes de programación</h1>

    <p class="letra">
        A
    </p>
    <ul>
        <li>ActionScript</li>
        <li>Actor</li>
        <li>Ada</li>
        <li>Algol 60</li>
    </ul>

    <p class="letra">
        B
    </p>
    <ul>
        <li>B</li>
        <li>Bash</li>
        <li>Basic</li>
        <li>Boo</li>
    </ul>

    <p class="letra">
        C
    </p>
    <ul>
        <li>C++</li>
        <li>Clipper</li>
        <li>COBOL</li>
        <li>ColdFusion</li>
    </ul>

    <p class="letra">
        D
    </p>
    <ul>
        <li>Dart</li>
        <li>Darwin</li>
        <li>dBase</li>
        <li>Delphi</li>
    </ul>

    <!-- Espacio vacío para que se pueda hacer scroll -->
    <div class="espacio"></div>

</body>

</html>
