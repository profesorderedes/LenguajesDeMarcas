<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Pruebas</title>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Redressed&family=Shippori+Mincho+B1&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin-left: 10%;
        }

        h1 {
            font-family: 'Redressed', cursive;
            font-weight: normal;
        }

        .cuadro-lista {
            width: 17rem;
        }

        ul {
            font-size: 1.2em;
            font-family: 'Shippori Mincho B1', serif;
            list-style-type: none;
        }

        li {
            border-bottom: 3px solid white;
            padding: 0.3rem 0;
            background-color: wheat;
        }
    </style>

</head>

<body>

    <h1>Cobra Kai, reparto:</h1>

    <div class="cuadro-lista">
        <ul>
            <li>Ralph Macchio</li>
            <li>William Zabka</li>
            <li>Courtney Henggeler</li>
            <li>Xolo Maridueña</li>
            <li>Tanner Buchanan</li>
            <li>Mary Mouser</li>
        </ul>
    </div>

</body>

</html>
