<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <title>Pruebas</title>

    <style>
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        h1 {
            font-size: 1.5em;
            color: seagreen;
        }

        .material-icons {
            font-size: 2em;
        }

        li {
            line-height: 2.5em;
            list-style-type: none;
        }

        .naranja {
            color: orangered;
        }

        .marron {
            color: maroon;
        }

        .oliva {
            color: olive;
        }

        .verde {
            color: lawngreen;
        }

        .rojo {
            color: red;
        }
    </style>

</head>

<body>

    <h1>Iconos de Google Fonts</h1>

    <p>Google Fonts también nos ofrece una variedad de iconos:</p>
    <ul>
        <li><i class="material-icons naranja">speed</i> Velocidad</li>
        <li><span class="material-icons marron">closed_caption</span> Subtítulos</li>
        <li><span class="material-icons oliva">savings</span> Ahorros</li>
        <li><span class="material-icons verde">explore</span> Explorar</li>
        <li><span class="material-icons rojo">print</span> Imprimir</li>
    </ul>

</body>

</html>
