<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 37</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: black;
        }

        .contenedor_foto{
            position: relative;
            margin: auto;
            width: 1000px;
            height: 100vh;
        }

        img {
            width: 100%;
            height: 100%;
        }

        .texto {
            position: absolute;
            padding: 10px;
            border-radius: 5px;
            background-color: rgba(238, 243, 243, 0.678);
        }

        .pos1 {
            top: 30px;
            left: 30px;
        }

        .pos2 {
            bottom: 10px;
            right: 20px;
        }
    </style>
</head>

<body>
    <div class="contenedor_foto">
        <img src="imgs/arquitectura/arsene-m-ovrejorde-BovGw4div6U-unsplash.jpg" alt="Ópera de Oslo">
        <div class="texto pos1">Edificio extraño fotografiado durante la puesta de Sol</div>
        <div class="texto pos2">&copy; Carlos Design Solutions</div>
    </div>

</body>

</html>
